<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Chat</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="login-screen" class="screen">
        <div class="login-box">
            <h2>Secure Login</h2>
            <input type="email" id="email" placeholder="User Email">
            <div class="password-container">
                <input type="password" id="password" placeholder="Password">
                <button type="button" id="toggle-password" aria-label="Toggle password visibility">👁️</button>
            </div>
            <button id="login-btn">Enter Chat</button>
            <p id="error-msg"></p>
        </div>
    </div>

    <div id="chat-screen" class="screen hidden">
        <div id="chat-header">
            <h3>Private Chat Room</h3>
            <div class="header-actions">
                <button id="theme-toggle" aria-label="Toggle Theme">🌙</button>
                <button id="logout-btn">Leave</button>
            </div>
        </div>

        <div id="chat-messages">
        </div>

        <div id="presence-indicator" class="hidden">👀</div>

        <div id="reaction-menu" class="hidden">
            <span class="quick-emoji">👍</span><span class="quick-emoji">❤️</span><span class="quick-emoji">😂</span><span class="quick-emoji">😮</span><span class="quick-emoji">😢</span><span id="more-emojis-btn">➕</span>
        </div>

        <div id="emoji-picker" class="hidden">
        </div>

        <div id="chat-input-area">
            <input type="text" id="message-input" placeholder="Message..." autocomplete="off">
            <button id="mic-btn" aria-label="Record Voice Note">🎙️</button>
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
